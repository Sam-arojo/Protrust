[build]
  base = "frontend"
  command = "cd .. && npm install && cd frontend && npm install && npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Scheduled Functions Configuration
[functions."scheduled-code-generator"]
  schedule = "* * * * *"

# Extended timeout for large batch PDF generation
[functions."download-batch-pdf"]
  timeout = 120

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
